<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Gradus</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page-shell page-center">
    <header class="form-header">
      <div>
        <h1>Login do administrador</h1>
        <p>Acesse o painel de controle do Gradus.</p>
      </div>
      <a href="index.html" class="button button-outline">Voltar</a>
    </header>

    <main class="form-panel">
      <form id="loginForm" class="form-card">
        <label for="usuario">Usuário</label>
        <input type="text" id="usuario" name="usuario" placeholder="admin" required />

        <label for="senha">Senha</label>
        <input type="password" id="senha" name="senha" placeholder="Sua senha" required />

        <button type="submit" class="button button-primary">Entrar</button>
        <p id="mensagemLogin" class="form-message"></p>
      </form>
    </main>
  </div>
  <script src="js/login.js"></script>
</body>
</html>
