<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradus VR Quiz</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>body { margin: 0; }</style>
</head>
<body>
  <a-scene background="color: #0F1419">
    <a-sky color="#0F1419"></a-sky>
    <a-entity light="type: ambient; color: #ffffff; intensity: 0.6"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 1" position="5 8 3"></a-entity>

    <!-- Chão (plano grande) -->
    <a-plane rotation="-90 0 0" width="60" height="60" color="#070b12"></a-plane>

    <!-- RIG: container de câmera e locomoção -->
    <a-entity id="rig" position="0 0 6">
      <a-entity 
        id="camera"
        camera
        look-controls
        position="0 1.6 0"
        cursor="fuse: true; fuseTimeout: 900"
        raycaster="objects: .clickable; far: 50">
        <a-cursor 
          id="cursor"
          color="#FFD166"
          fuse="true"
          fuse-timeout="900"
          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
          material="shader: flat; transparent: true; opacity: 1">
        </a-cursor>
      </a-entity>
    </a-entity>

    <!-- Painel de interface (quiz + Final) -->
    <a-entity id="interfacePanel" position="0 1.8 -3.5">
      <a-box depth="0.15" height="4" width="5.6" color="#172032" material="opacity: 0.96"></a-box>

      <!-- Resultado Final -->
      <a-entity id="resultadoTitulo" visible="false" text="value: ; width: 4.8; color: #bdd8ff; anchor: center; align: center; wrapCount: 40; fontSize: 18" position="0 1.8 0.08" pointer-events="none"></a-entity>
      <a-entity id="contador" text="value: ; width: 4.8; color: #bdd8ff; anchor: center; align: center; wrapCount: 40; fontSize: 14" position="0 1.45 0.08"></a-entity>

      <!-- Pergunta -->
      <a-entity id="pergunta" text="value: ; width: 4.6; color: #eef4fb; anchor: center; align: center; wrapCount: 60; fontSize: 14" position="0 1.05 0.08"></a-entity>

      <!-- Alternativas (5 opções) -->
      <a-entity id="box0" class="clickable" position="0 0.45 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(0)"></a-entity>
      <a-entity id="alt0" text="value: ; width: 4.2; color: #eef4fb; anchor: center; align: center; fontSize: 13" position="0 0.45 0.17" pointer-events="none"></a-entity>

      <a-entity id="box1" class="clickable" position="0 -0.05 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(1)"></a-entity>
      <a-entity id="alt1" text="value: ; width: 4.2; color: #eef4fb; anchor: center; align: center; fontSize: 13" position="0 -0.05 0.17" pointer-events="none"></a-entity>

      <a-entity id="box2" class="clickable" position="0 -0.55 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(2)"></a-entity>
      <a-entity id="alt2" text="value: ; width: 4.2; color: #eef4fb; anchor: center; align: center; fontSize: 13" position="0 -0.55 0.17" pointer-events="none"></a-entity>

      <a-entity id="box3" class="clickable" position="0 -1.05 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(3)"></a-entity>
      <a-entity id="alt3" text="value: ; width: 4.2; color: #eef4fb; anchor: center; align: center; fontSize: 13" position="0 -1.05 0.17" pointer-events="none"></a-entity>

      <a-entity id="box4" class="clickable" position="0 -1.55 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(4)"></a-entity>
      <a-entity id="alt4" text="value: ; width: 4.2; color: #eef4fb; anchor: center; align: center; fontSize: 13" position="0 -1.55 0.17" pointer-events="none"></a-entity>

      <!-- Feedback -->
      <a-entity id="feedback" text="value: ; width: 4.8; color: #f5c66b; anchor: center; align: center; wrapCount: 40; fontSize: 13" position="0 -2.15 0.08"></a-entity>

      <!-- Botões (ocultos até tela final) -->
      <a-box id="btnVoltarMapa" class="clickable" position="-1.3 -0.8 0.08" width="1.8" height="0.45" depth="0.08" color="#6b7b9f" opacity="0.96" visible="false" onclick="voltarMapa()"></a-box>
      <a-text id="textBtnVoltar" class="clickable" value="VOLTAR AO LOBBY" onclick="voltarMapa()" width="1.6" color="#fff" anchor="center" align="center" wrapCount="6" font-size="12" position="-1.3 -0.8 0.15" visible="false"></a-text>

      <a-box id="btnSair" class="clickable" position="1.3 -0.8 0.08" width="1.8" height="0.45" depth="0.08" color="#d35c5c" opacity="0.96" visible="false" onclick="sairExperiencia()"></a-box>
      <a-text id="textBtnSair" class="clickable" value="SAIR DA EXPERIENCIA" onclick="sairExperiencia()" width="1.6" color="#fff" anchor="center" align="center" wrapCount="6" font-size="12" position="1.3 -0.8 0.15" visible="false"></a-text>
    </a-entity>

    <!-- Painel de Salas/Períodos (oculto inicialmente) -->
    <a-entity id="salasPanel" position="0 1.5 -4" visible="false">
      <a-box depth="0.15" height="3.5" width="6" color="#172032" material="opacity: 0.96"></a-box>

      <a-entity id="titleSalas" text="value: ESCOLHA UM PERIODO; width: 5.5; color: #bdd8ff; anchor: center; align: center; wrapCount: 40; fontSize: 14" position="0 1.5 0.08"></a-entity>

      <!-- Grid de salas (até 10) - 2 colunas -->
      <!-- Linha 1 -->
      <a-box id="sala-periodo-1" class="clickable click-debug" position="-1.8 1 0.08" width="1.8" height="1" depth="0.2" color="#2ec4b6" onclick="escolherPeriodoVR(1)"></a-box>
      <a-text id="sala-periodo-text-1" class="clickable" value="1 PERIODO" onclick="escolherPeriodoVR(1)" width="1.5" color="#fff" anchor="center" align="center" font-size="14" position="-1.8 1 0.28"></a-text>

      <a-box id="sala-periodo-2" class="clickable click-debug" position="1.8 1 0.08" width="1.8" height="1" depth="0.2" color="#2ec4b6" onclick="escolherPeriodoVR(2)"></a-box>
      <a-text id="sala-periodo-text-2" class="clickable" value="2 PERIODO" onclick="escolherPeriodoVR(2)" width="1.5" color="#fff" anchor="center" align="center" font-size="14" position="1.8 1 0.28"></a-text>

      <!-- Linha 2 -->
      <a-box id="sala-periodo-3" class="clickable click-debug" position="-1.8 0.2 0.08" width="1.8" height="1" depth="0.2" color="#2ec4b6" onclick="escolherPeriodoVR(3)"></a-box>
      <a-text id="sala-periodo-text-3" class="clickable" value="3 PERIODO" onclick="escolherPeriodoVR(3)" width="1.5" color="#fff" anchor="center" align="center" font-size="14" position="-1.8 0.2 0.28"></a-text>

      <a-box id="sala-periodo-4" class="clickable click-debug" position="1.8 0.2 0.08" width="1.8" height="1" depth="0.2" color="#2ec4b6" onclick="escolherPeriodoVR(4)"></a-box>
      <a-text id="sala-periodo-text-4" class="clickable" value="4 PERIODO" onclick="escolherPeriodoVR(4)" width="1.5" color="#fff" anchor="center" align="center" font-size="14" position="1.8 0.2 0.28"></a-text>

      <!-- Linha 3 -->
      <a-box id="sala-periodo-5" class="clickable click-debug" position="-1.8 -0.6 0.08" width="1.8" height="1" depth="0.2" color="#2ec4b6" onclick="escolherPeriodoVR(5)"></a-box>
      <a-text id="sala-periodo-text-5" class="clickable" value="5 PERIODO" onclick="escolherPeriodoVR(5)" width="1.5" color="#fff" anchor="center" align="center" font-size="14" position="-1.8 -0.6 0.28"></a-text>

      <a-box id="sala-periodo-6" class="clickable click-debug" position="1.8 -0.6 0.08" width="1.8" height="1" depth="0.2" color="#2ec4b6" onclick="escolherPeriodoVR(6)"></a-box>
      <a-text id="sala-periodo-text-6" class="clickable" value="6 PERIODO" onclick="escolherPeriodoVR(6)" width="1.5" color="#fff" anchor="center" align="center" font-size="14" position="1.8 -0.6 0.28"></a-text>

      <!-- Linha 4 -->
      <a-box id="sala-periodo-7" class="clickable click-debug" position="-1.8 -1.4 0.08" width="1.8" height="1" depth="0.2" color="#2ec4b6" onclick="escolherPeriodoVR(7)"></a-box>
      <a-text id="sala-periodo-text-7" class="clickable" value="7 PERIODO" onclick="escolherPeriodoVR(7)" width="1.5" color="#fff" anchor="center" align="center" font-size="14" position="-1.8 -1.4 0.28"></a-text>

      <a-box id="sala-periodo-8" class="clickable click-debug" position="1.8 -1.4 0.08" width="1.8" height="1" depth="0.2" color="#2ec4b6" onclick="escolherPeriodoVR(8)"></a-box>
      <a-text id="sala-periodo-text-8" class="clickable" value="8 PERIODO" onclick="escolherPeriodoVR(8)" width="1.5" color="#fff" anchor="center" align="center" font-size="14" position="1.8 -1.4 0.28"></a-text>

      <!-- Linha 5 (apenas para Direito - até Sala 10) -->
      <a-box id="sala-periodo-9" class="clickable click-debug" position="-1.8 -2.2 0.08" width="1.8" height="1" depth="0.2" color="#2ec4b6" visible="false" onclick="escolherPeriodoVR(9)"></a-box>
      <a-text id="sala-periodo-text-9" class="clickable" value="9 PERIODO" onclick="escolherPeriodoVR(9)" width="1.5" color="#fff" anchor="center" align="center" font-size="14" position="-1.8 -2.2 0.28" visible="false"></a-text>

      <a-box id="sala-periodo-10" class="clickable click-debug" position="1.8 -2.2 0.08" width="1.8" height="1" depth="0.2" color="#2ec4b6" visible="false" onclick="escolherPeriodoVR(10)"></a-box>
      <a-text id="sala-periodo-text-10" class="clickable" value="10 PERIODO" onclick="escolherPeriodoVR(10)" width="1.5" color="#fff" anchor="center" align="center" font-size="14" position="1.8 -2.2 0.28" visible="false"></a-text>

      <!-- Botão voltar -->
      <a-box id="btnVoltarCurso" class="clickable" position="0 -2.9 0.08" width="2.2" height="0.6" depth="0.12" color="#6b7b9f" opacity="0.96" onclick="mostrarMapaPrincipal()"></a-box>
      <a-text text="value: VOLTAR AO MAPA; width: 2; color: #fff; anchor: center; align: center; wrapCount: 10; fontSize: 14" position="0 -2.9 0.17" pointer-events="none"></a-text>
    </a-entity>

    <!-- Prédios e pontos de interesse no mapa principal -->
    <a-entity id="predioCCGroup" visible="true" position="-8 0 0">
      <!-- Prédio CC (azul/verde) -->
      <a-entity id="predioCCBox" class="clickable" geometry="primitive: box; width: 3; height: 3; depth: 2" material="color: #1e7b7e; metalness: 0.3" position="0 1.5 0" onclick="escolherCursoVR('tecnologia')"></a-entity>
      <a-entity class="clickable" text="value: CC\nCIENCIA DA\nCOMPUTACAO; width: 2.8; color: #fff; anchor: center; align: center; fontSize: 13" position="0 1.5 1.2" onclick="escolherCursoVR('tecnologia')" pointer-events="none"></a-entity>
    </a-entity>

    <a-entity id="predioDireitoGroup" visible="true" position="8 0 0">
      <!-- Prédio Direito (roxo/dourado) -->
      <a-entity id="predioDireitoBox" class="clickable" geometry="primitive: box; width: 3; height: 3; depth: 2" material="color: #6b3fa0; metalness: 0.3" position="0 1.5 0" onclick="escolherCursoVR('direito')"></a-entity>
      <a-entity class="clickable" text="value: DIREITO; width: 2.8; color: #f5b641; anchor: center; align: center; fontSize: 14" position="0 1.5 1.2" onclick="escolherCursoVR('direito')" pointer-events="none"></a-entity>
    </a-entity>

    <!-- Pontos de teleporte no chão (visual + clicável) -->
    <a-entity id="tpInicio" class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #3f5a7f; emissive: #3f5a7f" position="0 0.04 4" onclick="teleportar(0, 4)"></a-entity>
    <a-entity text="value: INICIO; width: 0.8; color: #fff; anchor: center; align: center; fontSize: 12" position="0 0.15 4" pointer-events="none"></a-entity>

    <a-entity id="tpCentro" class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #3f5a7f; emissive: #3f5a7f" position="0 0.04 1" onclick="teleportar(0, 1)"></a-entity>
    <a-entity text="value: CENTRO; width: 0.8; color: #fff; anchor: center; align: center; fontSize: 12" position="0 0.15 1" pointer-events="none"></a-entity>

    <a-entity id="tpCC" class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #2a7f7f; emissive: #2a7f7f" position="-3 0.04 -1" onclick="teleportar(-3, -1)"></a-entity>
    <a-entity text="value: CC; width: 0.8; color: #fff; anchor: center; align: center; fontSize: 12" position="-3 0.15 -1" pointer-events="none"></a-entity>

    <a-entity id="tpDireito" class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #6b3fa0; emissive: #6b3fa0" position="3 0.04 -1" onclick="teleportar(3, -1)"></a-entity>
    <a-entity text="value: DIREITO; width: 0.8; color: #f5b641; anchor: center; align: center; fontSize: 12" position="3 0.15 -1" pointer-events="none"></a-entity>
  </a-scene>

  <script src="script.js"></script>
</body>
</html>
