<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradus VR Quiz</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>body { margin: 0; }</style>
</head>
<body>
  <a-scene background="color: #0F1419">
    <a-sky color="#7da8cb"></a-sky>
    <a-entity light="type: hemisphere; skyColor: #e8f2ff; groundColor: #6c8c7b; intensity: 0.6"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 0.65" position="-5 12 4"></a-entity>
    <a-entity light="type: point; color: #f7f1e0; intensity: 0.6; distance: 30" position="0 5 0"></a-entity>
    <a-entity light="type: point; color: #f7f1e0; intensity: 0.45; distance: 18" position="-11 4 -7"></a-entity>
    <a-entity light="type: point; color: #f7f1e0; intensity: 0.45; distance: 18" position="11 4 -7"></a-entity>

    <!-- Chão maior e campus (área útil aumentada e caminhos alargados) -->
    <a-plane rotation="-90 0 0" width="140" height="140" color="#4c7d53"></a-plane>
    <a-plane rotation="-90 0 0" width="30" height="14" position="0 0.01 0" color="#9B9B9B"></a-plane>
    <a-plane rotation="-90 0 0" width="8" height="28" position="0 0.02 -6" color="#7F7F7F"></a-plane>
    <a-plane rotation="-90 0 0" width="30" height="10" position="0 0.02 -11" color="#8E8E8E"></a-plane>
    <a-circle radius="3.5" rotation="-90 0 0" color="#A5A5A5" position="0 0.03 0"></a-circle>
    <a-entity geometry="primitive: ring; radiusInner: 1.1; radiusOuter: 1.8" rotation="-90 0 0" material="color: #8E8E8E; opacity: 0.95" position="0 0.05 0"></a-entity>

    <!-- Fonte central -->
    <a-entity id="fonteCentral" position="0 0 0">
      <a-cylinder radius="1.4" height="0.18" color="#9c8f78" position="0 0.09 0"></a-cylinder>
      <a-cylinder radius="1.0" height="0.28" color="#75a8c6" opacity="0.85" position="0 0.24 0"></a-cylinder>
      <a-cylinder radius="0.35" height="0.28" color="#9c8f78" position="0 0.56 0"></a-cylinder>
      <a-sphere radius="0.08" color="#ffffff" position="0 0.85 0"></a-sphere>
      <a-entity text="value: FONTE CENTRAL; width: 4; color: #ffffff; anchor: center; align: center; fontSize: 10; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 1.1 0"></a-entity>
    </a-entity>

    <!-- NPC / Recepcionista perto da fonte (simples, sem modelos externos) -->
    <a-entity id="npcRecepc" position="-4 0 2.5" face-camera>
      <a-cylinder position="0 0.6 0" radius="0.25" height="1.2" color="#6b4f3a"></a-cylinder>
      <a-sphere position="0 1.5 0" radius="0.28" color="#f1d7c4"></a-sphere>
      <a-cylinder position="-0.45 0.8 0" radius="0.06" height="0.6" rotation="0 0 20" color="#6b4f3a"></a-cylinder>
      <a-cylinder position="0.45 0.8 0" radius="0.06" height="0.6" rotation="0 0 -20" color="#6b4f3a"></a-cylinder>
      <a-entity text="value: Bem-vindo ao Gradus VR\nExplore os ambientes e responda aos desafios; width: 4.2; color: #ffffff; anchor: center; align: center; fontSize: 14; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 2.3 0" pointer-events="none" face-camera></a-entity>
    </a-entity>

    <!-- Letreiro grande na entrada da praça -->
    <a-entity id="letreiroGradus" position="0 2.8 6" pointer-events="none">
      <a-entity text="value: GRADUS VR; width: 10; color: #ffffff; anchor: center; align: center; fontSize: 28" position="0 0 0"></a-entity>
      <a-entity text="value: AVALIACAO ACADEMICA IMERSIVA; width: 10; color: #ffffff; anchor: center; align: center; fontSize: 12; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 -0.4 0"></a-entity>
    </a-entity>

    <!-- Árvores reposicionadas para laterais, longe do caminho principal -->
    <a-entity id="arvoresDecor">
      <a-cylinder position="-12 0 5" radius="0.18" height="1.2" color="#6b4f3a" pointer-events="none"></a-cylinder>
      <a-sphere position="-12 1.2 5" radius="0.9" color="#2f8a4f" pointer-events="none"></a-sphere>

      <a-cylinder position="12 0 5" radius="0.18" height="1.2" color="#6b4f3a" pointer-events="none"></a-cylinder>
      <a-sphere position="12 1.2 5" radius="0.9" color="#2f8a4f" pointer-events="none"></a-sphere>

      <a-cylinder position="-12 0 -5" radius="0.18" height="1.2" color="#6b4f3a" pointer-events="none"></a-cylinder>
      <a-sphere position="-12 1.2 -5" radius="0.9" color="#2f8a4f" pointer-events="none"></a-sphere>

      <a-cylinder position="12 0 -5" radius="0.18" height="1.2" color="#6b4f3a" pointer-events="none"></a-cylinder>
      <a-sphere position="12 1.2 -5" radius="0.9" color="#2f8a4f" pointer-events="none"></a-sphere>

      <a-cylinder position="-11 0 -15" radius="0.18" height="1.2" color="#6b4f3a" pointer-events="none"></a-cylinder>
      <a-sphere position="-11 1.2 -15" radius="0.9" color="#2f8a4f" pointer-events="none"></a-sphere>

      <a-cylinder position="11 0 -15" radius="0.18" height="1.2" color="#6b4f3a" pointer-events="none"></a-cylinder>
      <a-sphere position="11 1.2 -15" radius="0.9" color="#2f8a4f" pointer-events="none"></a-sphere>

      <a-cylinder position="-11 0 -25" radius="0.18" height="1.2" color="#6b4f3a" pointer-events="none"></a-cylinder>
      <a-sphere position="-11 1.2 -25" radius="0.9" color="#2f8a4f" pointer-events="none"></a-sphere>

      <a-cylinder position="11 0 -25" radius="0.18" height="1.2" color="#6b4f3a" pointer-events="none"></a-cylinder>
      <a-sphere position="11 1.2 -25" radius="0.9" color="#2f8a4f" pointer-events="none"></a-sphere>

      <a-cylinder position="-11 0 -35" radius="0.18" height="1.2" color="#6b4f3a" pointer-events="none"></a-cylinder>
      <a-sphere position="-11 1.2 -35" radius="0.9" color="#2f8a4f" pointer-events="none"></a-sphere>

      <a-cylinder position="11 0 -35" radius="0.18" height="1.2" color="#6b4f3a" pointer-events="none"></a-cylinder>
      <a-sphere position="11 1.2 -35" radius="0.9" color="#2f8a4f" pointer-events="none"></a-sphere>
    </a-entity>

    <!-- Bancos reposicionados para ficar mais longe da fonte e do caminho -->
    <a-entity id="bancos">
      <a-box position="-6 0.35 3" width="1.4" height="0.15" depth="0.5" color="#6b3e26" pointer-events="none"></a-box>
      <a-box position="-6.45 0.05 3" width="0.12" height="0.35" depth="0.12" color="#4a2b1c" pointer-events="none"></a-box>
      <a-box position="-5.55 0.05 3" width="0.12" height="0.35" depth="0.12" color="#4a2b1c" pointer-events="none"></a-box>

      <a-box position="6 0.35 3" width="1.4" height="0.15" depth="0.5" color="#6b3e26" pointer-events="none"></a-box>
      <a-box position="5.55 0.05 3" width="0.12" height="0.35" depth="0.12" color="#4a2b1c" pointer-events="none"></a-box>
      <a-box position="6.45 0.05 3" width="0.12" height="0.35" depth="0.12" color="#4a2b1c" pointer-events="none"></a-box>

      <a-box position="-7 0.35 -2" width="1.4" height="0.15" depth="0.5" color="#6b3e26" pointer-events="none"></a-box>
      <a-box position="-7.45 0.05 -2" width="0.12" height="0.35" depth="0.12" color="#4a2b1c" pointer-events="none"></a-box>
      <a-box position="-6.55 0.05 -2" width="0.12" height="0.35" depth="0.12" color="#4a2b1c" pointer-events="none"></a-box>

      <a-box position="7 0.35 -2" width="1.4" height="0.15" depth="0.5" color="#6b3e26" pointer-events="none"></a-box>
      <a-box position="6.55 0.05 -2" width="0.12" height="0.35" depth="0.12" color="#4a2b1c" pointer-events="none"></a-box>
      <a-box position="7.45 0.05 -2" width="0.12" height="0.35" depth="0.12" color="#4a2b1c" pointer-events="none"></a-box>
    </a-entity>

    <!-- RIG: container de câmera e locomoção -->
    <a-entity id="rig" position="0 0 6">
      <a-entity 
        id="camera"
        camera
        look-controls
        position="0 1.6 0"
        cursor="fuse: true; fuseTimeout: 900"
        raycaster="objects: .clickable; far: 50">
        <a-cursor 
          id="cursor"
          color="#FFD166"
          fuse="true"
          fuse-timeout="900"
          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
          material="shader: flat; transparent: true; opacity: 1">
        </a-cursor>
      </a-entity>
    </a-entity>

    <!-- Painel de interface (quiz + Final) -->
    <a-entity id="interfacePanel" visible="false" position="0 1.8 -3.5">
      <a-box depth="0.15" height="4" width="5.6" color="#172032" material="opacity: 0.96"></a-box>

      <!-- Resultado Final -->
      <a-entity id="resultadoTitulo" visible="false" text="value: ; width: 4.8; color: #bdd8ff; anchor: center; align: center; wrapCount: 40; fontSize: 18; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 1.8 0.08" pointer-events="none"></a-entity>
      <a-entity id="contador" text="value: ; width: 4.8; color: #bdd8ff; anchor: center; align: center; wrapCount: 40; fontSize: 14; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 1.45 0.08"></a-entity>

      <!-- Pergunta -->
      <a-entity id="pergunta" text="value: ; width: 5.2; color: #eef4fb; anchor: left; align: left; wrapCount: 60; fontSize: 18; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="-2.5 1.05 0.08"></a-entity>

      <!-- Alternativas (5 opções) -->
      <a-entity id="box0" class="clickable" position="0 0.45 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(0)"></a-entity>
      <a-entity id="alt0" text="value: ; width: 4.2; color: #eef4fb; anchor: left; align: left; fontSize: 14; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="-2.2 0.45 0.17" pointer-events="none"></a-entity>

      <a-entity id="box1" class="clickable" position="0 -0.05 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(1)"></a-entity>
      <a-entity id="alt1" text="value: ; width: 4.2; color: #eef4fb; anchor: left; align: left; fontSize: 14; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="-2.2 -0.05 0.17" pointer-events="none"></a-entity>

      <a-entity id="box2" class="clickable" position="0 -0.55 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(2)"></a-entity>
      <a-entity id="alt2" text="value: ; width: 4.2; color: #eef4fb; anchor: left; align: left; fontSize: 14; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="-2.2 -0.55 0.17" pointer-events="none"></a-entity>

      <a-entity id="box3" class="clickable" position="0 -1.05 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(3)"></a-entity>
      <a-entity id="alt3" text="value: ; width: 4.2; color: #eef4fb; anchor: left; align: left; fontSize: 14; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="-2.2 -1.05 0.17" pointer-events="none"></a-entity>

      <a-entity id="box4" class="clickable" position="0 -1.55 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(4)"></a-entity>
      <a-entity id="alt4" text="value: ; width: 4.2; color: #eef4fb; anchor: left; align: left; fontSize: 14; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="-2.2 -1.55 0.17" pointer-events="none"></a-entity>

      <!-- Feedback -->
      <a-entity id="feedback" text="value: ; width: 4.8; color: #f5c66b; anchor: center; align: center; wrapCount: 40; fontSize: 13; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 -2.15 0.08"></a-entity>

      <!-- Botões (ocultos até tela final) -->
      <a-box id="btnVoltarMapa" class="clickable" position="-1.9 -0.8 0.08" width="1.6" height="0.45" depth="0.08" color="#6b7b9f" opacity="0.96" visible="false" onclick="voltarMapa()"></a-box>
      <a-text id="textBtnVoltar" class="clickable" value="VOLTAR AO LOBBY" onclick="voltarMapa()" width="1.4" color="#fff" anchor="center" align="center" wrapCount="6" font-size="12" position="-1.9 -0.8 0.15" visible="false"></a-text>

      <a-box id="btnRefazer" class="clickable" position="0 -0.8 0.08" width="1.8" height="0.45" depth="0.08" color="#3fd497" opacity="0.96" visible="false" onclick="novoQuiz()"></a-box>
      <a-text id="textBtnRefazer" class="clickable" value="REFAZER QUIZ" onclick="novoQuiz()" width="1.6" color="#fff" anchor="center" align="center" wrapCount="6" font-size="12" position="0 -0.8 0.15" visible="false"></a-text>

      <a-box id="btnSair" class="clickable" position="1.9 -0.8 0.08" width="1.6" height="0.45" depth="0.08" color="#d35c5c" opacity="0.96" visible="false" onclick="sairExperiencia()"></a-box>
      <a-text id="textBtnSair" class="clickable" value="SAIR DA EXPERIENCIA" onclick="sairExperiencia()" width="1.4" color="#fff" anchor="center" align="center" wrapCount="6" font-size="12" position="1.9 -0.8 0.15" visible="false"></a-text>
    </a-entity>

    <!-- Corredor de períodos atrás da praça -->
    <a-entity id="corredorGroup">
      <!-- Corredor ampliado: largura maior e comprimento maior -->
      <a-plane rotation="-90 0 0" width="12" height="80" color="#8A8A8A" position="0 0.01 -34"></a-plane>
      <a-plane rotation="-90 0 0" width="2" height="80" color="#6E6E6E" position="0 0.02 -34"></a-plane>
      <a-box width="0.25" height="0.35" depth="80" color="#9A9A9A" position="-6 0.2 -34"></a-box>
      <a-box width="0.25" height="0.35" depth="80" color="#A8A8A8" position="6 0.2 -34"></a-box>
      <!-- corridor heading removed to reduce visual noise (plaques used instead) -->
      <a-entity id="portasCorredor"></a-entity>

      <!-- Postes de luz ao longo do corredor (simples, com point-light fraca) -->
      <a-entity id="postesCorredor">
        <a-entity position="-4.5 0 -8">
          <a-cylinder position="0 0.9 0" radius="0.07" height="1.8" color="#888" pointer-events="none"></a-cylinder>
          <a-sphere position="0 1.8 0" radius="0.18" color="#fff2a0" pointer-events="none"></a-sphere>
          <a-entity light="type: point; intensity: 0.55; distance: 8; color: #fff2a0" position="0 1.8 0"></a-entity>
        </a-entity>
        <a-entity position="4.5 0 -8">
          <a-cylinder position="0 0.9 0" radius="0.07" height="1.8" color="#888" pointer-events="none"></a-cylinder>
          <a-sphere position="0 1.8 0" radius="0.18" color="#fff2a0" pointer-events="none"></a-sphere>
          <a-entity light="type: point; intensity: 0.55; distance: 8; color: #fff2a0" position="0 1.8 0"></a-entity>
        </a-entity>
        <a-entity position="-4.5 0 -18">
          <a-cylinder position="0 0.9 0" radius="0.07" height="1.8" color="#888" pointer-events="none"></a-cylinder>
          <a-sphere position="0 1.8 0" radius="0.18" color="#fff2a0" pointer-events="none"></a-sphere>
          <a-entity light="type: point; intensity: 0.55; distance: 8; color: #fff2a0" position="0 1.8 0"></a-entity>
        </a-entity>
        <a-entity position="4.5 0 -18">
          <a-cylinder position="0 0.9 0" radius="0.07" height="1.8" color="#888" pointer-events="none"></a-cylinder>
          <a-sphere position="0 1.8 0" radius="0.18" color="#fff2a0" pointer-events="none"></a-sphere>
          <a-entity light="type: point; intensity: 0.55; distance: 8; color: #fff2a0" position="0 1.8 0"></a-entity>
        </a-entity>
        <a-entity position="-4.5 0 -28">
          <a-cylinder position="0 0.9 0" radius="0.07" height="1.8" color="#888" pointer-events="none"></a-cylinder>
          <a-sphere position="0 1.8 0" radius="0.18" color="#fff2a0" pointer-events="none"></a-sphere>
          <a-entity light="type: point; intensity: 0.55; distance: 8; color: #fff2a0" position="0 1.8 0"></a-entity>
        </a-entity>
        <a-entity position="4.5 0 -28">
          <a-cylinder position="0 0.9 0" radius="0.07" height="1.8" color="#888" pointer-events="none"></a-cylinder>
          <a-sphere position="0 1.8 0" radius="0.18" color="#fff2a0" pointer-events="none"></a-sphere>
          <a-entity light="type: point; intensity: 0.55; distance: 8; color: #fff2a0" position="0 1.8 0"></a-entity>
        </a-entity>
        <a-entity position="-4.5 0 -38">
          <a-cylinder position="0 0.9 0" radius="0.07" height="1.8" color="#888" pointer-events="none"></a-cylinder>
          <a-sphere position="0 1.8 0" radius="0.18" color="#fff2a0" pointer-events="none"></a-sphere>
          <a-entity light="type: point; intensity: 0.55; distance: 8; color: #fff2a0" position="0 1.8 0"></a-entity>
        </a-entity>
        <a-entity position="4.5 0 -38">
          <a-cylinder position="0 0.9 0" radius="0.07" height="1.8" color="#888" pointer-events="none"></a-cylinder>
          <a-sphere position="0 1.8 0" radius="0.18" color="#fff2a0" pointer-events="none"></a-sphere>
          <a-entity light="type: point; intensity: 0.55; distance: 8; color: #fff2a0" position="0 1.8 0"></a-entity>
        </a-entity>
      </a-entity>

      <!-- Pontos de movimentação no corredor (sequência mais próxima para mira fácil) -->
      <a-entity id="corredorPontos">
        <a-entity class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #3f5a7f; emissive: #3f5a7f" position="0 0.04 -8" onclick="teleportar(0, -8)"></a-entity>
        

        <a-entity class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #3f5a7f; emissive: #3f5a7f" position="0 0.04 -11" onclick="teleportar(0, -11)"></a-entity>
        

        <a-entity class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #3f5a7f; emissive: #3f5a7f" position="0 0.04 -14" onclick="teleportar(0, -14)"></a-entity>
        

        <a-entity class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #3f5a7f; emissive: #3f5a7f" position="0 0.04 -17" onclick="teleportar(0, -17)"></a-entity>
        

        <a-entity class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #3f5a7f; emissive: #3f5a7f" position="0 0.04 -20" onclick="teleportar(0, -20)"></a-entity>
        

        <a-entity class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #3f5a7f; emissive: #3f5a7f" position="0 0.04 -23" onclick="teleportar(0, -23)"></a-entity>
        

        <a-entity class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #3f5a7f; emissive: #3f5a7f" position="0 0.04 -26" onclick="teleportar(0, -26)"></a-entity>
        

        <a-entity class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #3f5a7f; emissive: #3f5a7f" position="0 0.04 -29" onclick="teleportar(0, -29)"></a-entity>
        

        <a-entity class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #3f5a7f; emissive: #3f5a7f" position="0 0.04 -32" onclick="teleportar(0, -32)"></a-entity>
        

        <a-entity class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #3f5a7f; emissive: #3f5a7f" position="0 0.04 -35" onclick="teleportar(0, -35)"></a-entity>
        

        <a-entity class="clickable" geometry="primitive: cylinder; radius: 0.45; height: 0.08" material="color: #3f5a7f; emissive: #3f5a7f" position="0 0.04 -38" onclick="teleportar(0, -38)"></a-entity>
        
      </a-entity>
    </a-entity>

    <!-- Prédios e pontos de interesse no mapa principal -->
    <a-entity id="predioCCGroup" visible="true" position="-12 0 -7">
      <!-- Prédio CC (azul) -->
      <a-box id="predioCCBox" class="clickable click-debug" geometry="primitive: box; width: 4; height: 3.5; depth: 3" material="color: #2c74b3; metalness: 0.2" position="0 1.75 0"></a-box>
      <a-box width="4.2" height="0.8" depth="0.18" color="#1d4f7a" position="0 3.45 0.9"></a-box>
      <a-entity text="value: TECNOLOGIA; width: 8.5; color: #FFFFFF; anchor: center; align: center; fontSize: 16; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 3.45 1.05" scale="1.15 1.15 1.15"></a-entity>
      <a-box position="0 0.12 2.1" width="2.6" height="0.3" depth="0.2" color="#f0e7c2"></a-box>
      <a-entity text="value: TECNOLOGIA; width: 3.2; color: #FFFFFF; anchor: center; align: center; fontSize: 8.6; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 0.4 2.11" scale="1.15 1.15 1.15"></a-entity>
      <a-cylinder radius="0.12" height="0.8" color="#ffffff" position="-1.5 0.4 1.4"></a-cylinder>
      <a-cylinder radius="0.12" height="0.8" color="#ffffff" position="1.5 0.4 1.4"></a-cylinder>
