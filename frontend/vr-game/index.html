<!DOCTYPE html>
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradus VR Quiz</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>body { margin: 0; }</style>
</head>
<body>
  <a-scene background="color: #0F1419">
    <a-sky color="#0F1419"></a-sky>
    <a-entity light="type: ambient; color: #ffffff; intensity: 0.5"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 0.8" position="0 4 2"></a-entity>

    <a-plane rotation="-90 0 0" width="40" height="40" color="#070b12"></a-plane>

    <a-entity camera look-controls position="0 1.7 4">
      <a-cursor fuse="true" fuse-timeout="500" material="color: #f5c66b; shader: flat; opacity: 0.9" raycaster="objects: .clickable"></a-cursor>
    </a-entity>

    <!-- Painel central simples e limpo -->
    <a-entity id="quizPanel" position="0 1.8 -3.5">
      <a-box depth="0.15" height="3.8" width="5.4" color="#172032" material="opacity: 0.96"></a-box>

      <!-- Contador / Pontuação -->
      <a-entity id="contador" text="value: Carregando...; width: 4.8; color: #bdd8ff; anchor: center; align: center; wrapCount: 40" position="0 1.55 0.08"></a-entity>

      <!-- Pergunta -->
      <a-entity id="pergunta" text="value: Aguarde...; width: 4.6; color: #eef4fb; anchor: center; align: center; wrapCount: 60;" position="0 1.05 0.08"></a-entity>

      <!-- Alternativas (cada uma com box clicável + texto) -->
      <a-entity id="box0" class="clickable" position="0 0.45 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(0)"></a-entity>
      <a-entity id="alt0" text="value: ; width: 4.2; color: #eef4fb; anchor: center; align: center;" position="0 0.45 0.17"></a-entity>

      <a-entity id="box1" class="clickable" position="0 -0.05 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(1)"></a-entity>
      <a-entity id="alt1" text="value: ; width: 4.2; color: #eef4fb; anchor: center; align: center;" position="0 -0.05 0.17"></a-entity>

      <a-entity id="box2" class="clickable" position="0 -0.55 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(2)"></a-entity>
      <a-entity id="alt2" text="value: ; width: 4.2; color: #eef4fb; anchor: center; align: center;" position="0 -0.55 0.17"></a-entity>

      <a-entity id="box3" class="clickable" position="0 -1.05 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(3)"></a-entity>
      <a-entity id="alt3" text="value: ; width: 4.2; color: #eef4fb; anchor: center; align: center;" position="0 -1.05 0.17"></a-entity>

      <a-entity id="box4" class="clickable" position="0 -1.55 0.08" geometry="primitive: box; width: 4.6; height: 0.48; depth: 0.12" material="color: #1d2a42; opacity: 0.96" onclick="responder(4)"></a-entity>
      <a-entity id="alt4" text="value: ; width: 4.2; color: #eef4fb; anchor: center; align: center;" position="0 -1.55 0.17"></a-entity>

      <!-- Feedback simples na base do painel -->
      <a-entity id="feedback" text="value: Escolha uma alternativa.; width: 4.8; color: #f5c66b; anchor: center; align: center; wrapCount: 40" position="0 -2.15 0.08"></a-entity>
    </a-entity>
  </a-scene>

  <script src="script_debug.js"></script>
</body>
</html>
