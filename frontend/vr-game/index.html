<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gradus VR Quiz</title>
  <!-- v6: quadro do quiz reduzido e centralizado na parede; posição de entrada ajustada -->
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <style>body { margin: 0; }</style>
</head>
<body>
  <a-scene background="color: #0F1419">
    <!--
      Assets Poly Pizza:
      Coloque seus modelos em frontend/vr-game/assets/models/.
      Exemplos de nomes esperados:
      university_building.glb, classroom_door.glb, teacher_npc.glb,
      desk.glb, chair.glb, blackboard.glb, book_stack.glb, trophy.glb.
      Para usar depois: troque uma primitiva por <a-entity gltf-model="#nomeDoAsset">.
    -->
    <a-assets>
      <!-- Asset enviado pelo usuário. Mantido apenas esse modelo externo; árvores/fonte continuam em A-Frame. -->
      <a-asset-item id="characterModel" src="assets/models/Character Animated.glb"></a-asset-item>
      <a-asset-item id="modelArvoreCorredor" src="../assets/models/Arvore_corredor.glb"></a-asset-item>
      <a-asset-item id="modelArvoreInicial" src="../assets/models/Arvore_inicial.glb"></a-asset-item>
      <a-asset-item id="modelBancoInicial" src="../assets/models/Banco_inicial.glb"></a-asset-item>
      <a-asset-item id="modelCharacter" src="../assets/models/Character Animated.glb"></a-asset-item>
      <a-asset-item id="modelFonteCentral" src="../assets/models/Fonte_central.glb"></a-asset-item>
      <a-asset-item id="modelMesaCadeira" src="../assets/models/Mesa_e_cadeira.glb"></a-asset-item>
      <a-asset-item id="modelPosteLuz" src="../assets/models/Poste_de_luz.glb"></a-asset-item>
      <a-asset-item id="modelPredioFaculdades" src="../assets/models/Predio_faculdades.glb"></a-asset-item>
    </a-assets>
    <a-sky color="#7da8cb"></a-sky>
    <a-entity light="type: hemisphere; skyColor: #e8f2ff; groundColor: #6c8c7b; intensity: 0.6"></a-entity>
    <a-entity light="type: directional; color: #ffffff; intensity: 0.65" position="-5 12 4"></a-entity>
    <a-entity light="type: point; color: #f7f1e0; intensity: 0.6; distance: 30" position="0 5 0"></a-entity>
    <a-entity light="type: point; color: #f7f1e0; intensity: 0.45; distance: 18" position="-11 4 -7"></a-entity>
    <a-entity light="type: point; color: #f7f1e0; intensity: 0.45; distance: 18" position="11 4 -7"></a-entity>

    <!-- Chão maior e campus (área útil aumentada e caminhos alargados) -->
    <a-plane rotation="-90 0 0" width="140" height="140" color="#4c7d53"></a-plane>
    <a-plane rotation="-90 0 0" width="30" height="14" position="0 0.01 0" color="#9B9B9B"></a-plane>
    <a-plane rotation="-90 0 0" width="8" height="28" position="0 0.02 -6" color="#7F7F7F"></a-plane>
    <a-plane rotation="-90 0 0" width="30" height="10" position="0 0.02 -11" color="#8E8E8E"></a-plane>
    <a-circle radius="3.5" rotation="-90 0 0" color="#A5A5A5" position="0 0.03 0"></a-circle>
    <a-entity geometry="primitive: ring; radiusInner: 1.1; radiusOuter: 1.8" rotation="-90 0 0" material="color: #8E8E8E; opacity: 0.95" position="0 0.05 0"></a-entity>

    <!-- Fonte central -->
    <a-entity id="fonteCentral" position="0 0 0">
      <a-entity gltf-model="#modelFonteCentral" position="0 0 0" scale="0.85 0.85 0.85"></a-entity>
    </a-entity>

    <!-- NPC / Recepcionista perto da fonte: substituído pelo asset Character Animated.glb -->
    <a-entity id="npcRecepc" position="-4 0 2.45">
      <a-entity gltf-model="#modelCharacter" position="0 0 0" rotation="0 -10 0" scale="0.7 0.7 0.7"></a-entity>
      <a-entity text="value: Escolha um curso\ne entre na sala; width: 4.2; color: #ffffff; anchor: center; align: center; fontSize: 14; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 2.25 0" pointer-events="none" face-camera></a-entity>
    </a-entity>

    <!-- Letreiro limpo na entrada da praça -->
    <a-entity id="letreiroGradus" position="0 2.9 5.5" pointer-events="none">
      <a-plane width="5.8" height="1.35" color="#10233a" material="opacity: 0.88"></a-plane>
      <a-entity text="value: GRADUS VR; width: 5.2; color: #ffffff; anchor: center; align: center; fontSize: 18; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 0.22 0.04"></a-entity>
      <a-entity text="value: Desafio imersivo; width: 4.8; color: #bdd8ff; anchor: center; align: center; fontSize: 8; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 -0.28 0.04"></a-entity>
    </a-entity>

    <!-- Árvores externas: área inicial limpa e corredor livre para futuras salas/assets -->
    <a-entity id="arvoresDecor">
      <a-entity gltf-model="#modelArvoreCorredor" position="-14.2 4.75 5.2" scale="2.9 2.9 2.9" pointer-events="none"></a-entity>
      <a-entity gltf-model="#modelArvoreCorredor" position="14.2 4.75 5.2" scale="2.9 2.9 2.9" pointer-events="none"></a-entity>

      <a-entity gltf-model="#modelArvoreCorredor" position="-14.2 4.75 -15.6" scale="2.9 2.9 2.9" pointer-events="none"></a-entity>
      <a-entity gltf-model="#modelArvoreCorredor" position="14.2 4.75 -15.6" scale="2.9 2.9 2.9" pointer-events="none"></a-entity>

      <a-entity gltf-model="#modelArvoreCorredor" position="-14.2 4.75 -25.6" scale="2.9 2.9 2.9" pointer-events="none"></a-entity>
      <a-entity gltf-model="#modelArvoreCorredor" position="14.2 4.75 -25.6" scale="2.9 2.9 2.9" pointer-events="none"></a-entity>

      <a-entity gltf-model="#modelArvoreCorredor" position="-14.2 4.75 -35.6" scale="2.9 2.9 2.9" pointer-events="none"></a-entity>
      <a-entity gltf-model="#modelArvoreCorredor" position="14.2 4.75 -35.6" scale="2.9 2.9 2.9" pointer-events="none"></a-entity>

      <a-entity gltf-model="#modelArvoreCorredor" position="-14.2 4.75 -45.6" scale="2.9 2.9 2.9" pointer-events="none"></a-entity>
      <a-entity gltf-model="#modelArvoreCorredor" position="14.2 4.75 -45.6" scale="2.9 2.9 2.9" pointer-events="none"></a-entity>
    </a-entity>

    <!-- Bancos alinhados: área inicial voltada para a fonte e corredor visual externo -->
    <a-entity id="bancos">
      <a-entity position="-12.4 0 3.4" rotation="0 90 0">
        <a-entity gltf-model="#modelBancoInicial" position="0 0.45 0" rotation="0 90 0" scale="2.8 2.8 2.8" pointer-events="none"></a-entity>
      </a-entity>
      <a-entity position="-12.4 0 2.2" rotation="0 90 0">
        <a-entity gltf-model="#modelBancoInicial" position="0 0.45 0" rotation="0 90 0" scale="2.8 2.8 2.8" pointer-events="none"></a-entity>
      </a-entity>

      <a-entity position="12.4 0 3.4" rotation="0 -90 0">
        <a-entity gltf-model="#modelBancoInicial" position="0 0.45 0" rotation="0 90 0" scale="2.8 2.8 2.8" pointer-events="none"></a-entity>
      </a-entity>
      <a-entity position="12.4 0 2.2" rotation="0 -90 0">
        <a-entity gltf-model="#modelBancoInicial" position="0 0.45 0" rotation="0 90 0" scale="2.8 2.8 2.8" pointer-events="none"></a-entity>
      </a-entity>

      <a-entity position="-12.4 0 -13.8" rotation="0 90 0">
        <a-entity gltf-model="#modelBancoInicial" position="0 0.45 0" rotation="0 90 0" scale="2.8 2.8 2.8" pointer-events="none"></a-entity>
      </a-entity>
      <a-entity position="12.4 0 -13.8" rotation="0 -90 0">
        <a-entity gltf-model="#modelBancoInicial" position="0 0.45 0" rotation="0 90 0" scale="2.8 2.8 2.8" pointer-events="none"></a-entity>
      </a-entity>
      <a-entity position="-12.4 0 -23.8" rotation="0 90 0">
        <a-entity gltf-model="#modelBancoInicial" position="0 0.45 0" rotation="0 90 0" scale="2.8 2.8 2.8" pointer-events="none"></a-entity>
      </a-entity>
      <a-entity position="12.4 0 -23.8" rotation="0 -90 0">
        <a-entity gltf-model="#modelBancoInicial" position="0 0.45 0" rotation="0 90 0" scale="2.8 2.8 2.8" pointer-events="none"></a-entity>
      </a-entity>
      <a-entity position="-12.4 0 -33.8" rotation="0 90 0">
        <a-entity gltf-model="#modelBancoInicial" position="0 0.45 0" rotation="0 90 0" scale="2.8 2.8 2.8" pointer-events="none"></a-entity>
      </a-entity>
      <a-entity position="12.4 0 -33.8" rotation="0 -90 0">
        <a-entity gltf-model="#modelBancoInicial" position="0 0.45 0" rotation="0 90 0" scale="2.8 2.8 2.8" pointer-events="none"></a-entity>
      </a-entity>
      <a-entity position="-12.4 0 -43.8" rotation="0 90 0">
        <a-entity gltf-model="#modelBancoInicial" position="0 0.45 0" rotation="0 90 0" scale="2.8 2.8 2.8" pointer-events="none"></a-entity>
      </a-entity>
      <a-entity position="12.4 0 -43.8" rotation="0 -90 0">
        <a-entity gltf-model="#modelBancoInicial" position="0 0.45 0" rotation="0 90 0" scale="2.8 2.8 2.8" pointer-events="none"></a-entity>
      </a-entity>
    </a-entity>

    <!-- RIG: container de câmera e locomoção -->
    <a-entity id="rig" position="0 0 9" rotation="0 0 0">
      <a-entity 
        id="camera"
        camera
        look-controls
        position="0 1.6 0"
        cursor="fuse: true; fuseTimeout: 900"
        raycaster="objects: .clickable; far: 50">
        <a-cursor 
          id="cursor"
          color="#FFD166"
          fuse="true"
          fuse-timeout="900"
          geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03"
          material="shader: flat; transparent: true; opacity: 1">
        </a-cursor>
      </a-entity>
    </a-entity>

    <!-- Sala de prova: aparece quando o aluno escolhe um curso/período.
         Os móveis usam primitivas A-Frame para manter o jogo leve.
         Depois, você pode substituir por modelos Poly Pizza (.glb). -->
    <a-entity id="salaQuizGroup" visible="false" position="0 0 -56">
      <!-- estrutura da sala -->
      <!-- Piso em box levemente elevado para evitar z-fighting/piscadas com o chão global e corredor externo.
           Mantém a mesma cor cinza do caminho/calçada para deixar a sala uniforme. -->
      <a-box width="24" height="0.10" depth="18" color="#9B9B9B" position="0 0.05 -0.5"></a-box>
      <a-box width="24" height="5.8" depth="0.18" color="#e9edf2" position="0 2.9 -8.9"></a-box>
      <a-box width="24" height="5.8" depth="0.18" color="#e9edf2" position="0 2.9 7.9" material="opacity: 0.28"></a-box>
      <a-box width="0.18" height="5.8" depth="18" color="#dce3ea" position="-12 2.9 -0.5"></a-box>
      <a-box width="0.18" height="5.8" depth="18" color="#dce3ea" position="12 2.9 -0.5"></a-box>
      <a-box width="24" height="0.16" depth="18" color="#f5f2e8" position="0 5.85 -0.5"></a-box>

      <!-- A lousa real do quiz é o interfacePanel.
           Removemos o quadro duplicado desta sala para evitar sobreposição/piscadas. -->
      <a-box width="24" height="0.42" depth="0.2" color="#3f86c7" position="0 4.85 -8.72"></a-box>

      <!-- mesas e cadeiras decorativas -->
      <a-entity id="carteirasSala">
        <a-entity gltf-model="#modelMesaCadeira" position="-7 0 -2.4" rotation="0 180 0" scale="2 2 2" pointer-events="none"></a-entity>
        <a-entity gltf-model="#modelMesaCadeira" position="7 0 -2.4" rotation="0 180 0" scale="2 2 2" pointer-events="none"></a-entity>
        <a-entity gltf-model="#modelMesaCadeira" position="-7 0 2.4" rotation="0 180 0" scale="2 2 2" pointer-events="none"></a-entity>
        <a-entity gltf-model="#modelMesaCadeira" position="7 0 2.4" rotation="0 180 0" scale="2 2 2" pointer-events="none"></a-entity>
      </a-entity>

      <!-- Professor da sala: substituído pelo asset Character Animated.glb -->
      <a-entity id="professorSala" position="-8.7 0 -7.15">
        <a-entity gltf-model="#modelCharacter" position="0 0 0" rotation="0 35 0" scale="0.7 0.7 0.7"></a-entity>
        <a-entity text="value: Professor; width: 2; color: #ffffff; anchor: center; align: center; fontSize: 9; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 2.10 0" face-camera></a-entity>
      </a-entity>

      <!-- porta de saida -->
      <a-box id="portaSaidaSala" class="clickable click-debug" width="1.7" height="2.2" depth="0.14" color="#6b7b9f" position="8.8 1.1 7.1" onclick="voltarMapa()"></a-box>
      <a-entity text="value: Sair; width: 2; color: #ffffff; anchor: center; align: center; fontSize: 10; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="8.8 2.45 7.0" face-camera></a-entity>

      <a-entity light="type: point; color: #ffffff; intensity: 0.65; distance: 14" position="0 5.35 -1"></a-entity>
      <a-entity light="type: point; color: #9ff9ff; intensity: 0.35; distance: 9" position="0 3.1 -7.4"></a-entity>

      <!-- Pontos de locomoção dentro da sala para aproximar/afastar do questionário -->
      <a-cylinder class="clickable" radius="0.48" height="0.07" color="#7fe7ff" material="emissive: #3fb8d8; opacity: 0.85" position="0 0.13 4.2" onclick="teleportar(0, -53.2)"></a-cylinder>
      <a-entity text="value: Entrada; width: 2.4; color: #ffffff; anchor: center; align: center; fontSize: 7; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 0.30 4.2" rotation="-90 0 0"></a-entity>
      <a-cylinder class="clickable" radius="0.48" height="0.07" color="#7fe7ff" material="emissive: #3fb8d8; opacity: 0.85" position="0 0.13 -3.3" onclick="teleportar(0, -57.0)"></a-cylinder>
      <a-entity text="value: Responder; width: 2.4; color: #ffffff; anchor: center; align: center; fontSize: 7; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 0.30 -3.3" rotation="-90 0 0"></a-entity>
    </a-entity>

    <!-- Painel de interface do quiz: agora usa toda a lousa/quadro da sala -->
    <a-entity id="interfacePanel" visible="false" position="0 2.65 -64.25">
      <!-- moldura e tela principal do quadro -->
      <a-box depth="0.08" height="4.00" width="11.00" color="#6f4b2f" position="0 0 0.02"></a-box>
      <a-box depth="0.09" height="3.50" width="10.45" color="#07172a" material="opacity: 0.98" position="0 0 0.10"></a-box>
      <a-box depth="0.04" height="0.04" width="9.85" color="#2ec4b6" position="0 1.59 0.17"></a-box>
      <a-box depth="0.04" height="3.18" width="0.035" color="#2ec4b6" position="-4.95 0 0.17"></a-box>
      <a-box depth="0.04" height="3.18" width="0.035" color="#2ec4b6" position="4.95 0 0.17"></a-box>
      <a-box depth="0.04" height="0.04" width="9.85" color="#2ec4b6" position="0 -1.59 0.17"></a-box>

      <!-- Topo: pergunta atual e pontuação -->
      <a-entity id="contador" text="value: ; width: 9.8; color: #ffffff; anchor: center; align: center; wrapCount: 50; fontSize: 6.8; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 1.34 0.22"></a-entity>
      <a-entity id="resultadoTitulo" visible="false" text="value: ; width: 9.8; color: #ffffff; anchor: center; align: center; wrapCount: 48; fontSize: 13; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 0.95 0.22" pointer-events="none"></a-entity>

      <!-- Pergunta e alternativas ficam todas dentro do quadro -->
      <a-entity id="pergunta" text="value: ; width: 9.8; color: #FFFFFF; anchor: center; align: center; wrapCount: 48; fontSize: 10; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 0.78 0.22"></a-entity>

      <a-entity id="box0" class="clickable" position="0 0.22 0.17" geometry="primitive: box; width: 8.65; height: 0.35; depth: 0.07" material="color: #16365b; opacity: 0.96" onclick="selecionarAlternativa(0)"></a-entity>
      <a-entity id="alt0" text="value: ; width: 8.0; color: #eef4fb; anchor: left; align: left; wrapCount: 70; fontSize: 5.6; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="-4.05 0.22 0.24" pointer-events="none"></a-entity>

      <a-entity id="box1" class="clickable" position="0 -0.20 0.17" geometry="primitive: box; width: 8.65; height: 0.35; depth: 0.07" material="color: #16365b; opacity: 0.96" onclick="selecionarAlternativa(1)"></a-entity>
      <a-entity id="alt1" text="value: ; width: 8.0; color: #eef4fb; anchor: left; align: left; wrapCount: 70; fontSize: 5.6; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="-4.05 -0.20 0.24" pointer-events="none"></a-entity>

      <a-entity id="box2" class="clickable" position="0 -0.62 0.17" geometry="primitive: box; width: 8.65; height: 0.35; depth: 0.07" material="color: #16365b; opacity: 0.96" onclick="selecionarAlternativa(2)"></a-entity>
      <a-entity id="alt2" text="value: ; width: 8.0; color: #eef4fb; anchor: left; align: left; wrapCount: 70; fontSize: 5.6; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="-4.05 -0.62 0.24" pointer-events="none"></a-entity>

      <a-entity id="box3" class="clickable" position="0 -1.04 0.17" geometry="primitive: box; width: 8.65; height: 0.35; depth: 0.07" material="color: #16365b; opacity: 0.96" onclick="selecionarAlternativa(3)"></a-entity>
      <a-entity id="alt3" text="value: ; width: 8.0; color: #eef4fb; anchor: left; align: left; wrapCount: 70; fontSize: 5.6; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="-4.05 -1.04 0.24" pointer-events="none"></a-entity>

      <a-entity id="box4" class="clickable" position="0 -1.46 0.17" geometry="primitive: box; width: 8.65; height: 0.35; depth: 0.07" material="color: #16365b; opacity: 0.96" onclick="selecionarAlternativa(4)"></a-entity>
      <a-entity id="alt4" text="value: ; width: 8.0; color: #eef4fb; anchor: left; align: left; wrapCount: 70; fontSize: 5.6; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="-4.05 -1.46 0.24" pointer-events="none"></a-entity>

      <a-entity id="feedback" text="value: ; width: 4.8; color: #f5c66b; anchor: center; align: center; wrapCount: 34; fontSize: 6.2; font: https://cdn.aframe.io/fonts/DejaVu-sdf.fnt" position="0 -1.68 0.28" pointer-events="none"></a-entity>
      <a-box id="btnConfirmar" class="clickable" position="0 -1.86 0.22" width="3.2" height="0.42" depth="0.08" color="#2d537b" opacity="0.96" visible="false" onclick="confirmarResposta()"></a-box>
      <a-text id="textBtnConfirmar" class="clickable" value="CONFIRMAR" onclick="confirmarResposta()" width="2.8" color="#ffffff" anchor="center" align="center" wrapCount="10" font-size="10" position="0 -1.86 0.31" visible="false"></a-text>

      <!-- Botões finais dentro do próprio quadro -->
      <a-box id="btnVoltarMapa" class="clickable" position="-3 -0.85 0.22" width="2.15" height="0.46" depth="0.08" color="#2d537b" opacity="0.96" visible="false" onclick="voltarMapa()"></a-box>
      <a-text id="textBtnVoltar" class="clickable" value="VOLTAR" onclick="voltarMapa()" width="1.85" color="#fff" anchor="center" align="center" wrapCount="8" font-size="10" position="-3 -0.85 0.31" visible="false"></a-text>

      <a-box id="btnRefazer" class="clickable" position="0 -0.85 0.22" width="2.35" height="0.46" depth="0.08" color="#2ec4b6" opacity="0.96" visible="false" onclick="novoQuiz()"></a-box>
      <a-text id="textBtnRefazer" class="clickable" value="REINICIAR" onclick="novoQuiz()" width="2.05" color="#07172a" anchor="center" align="center" wrapCount="8" font-size="10" position="0 -0.85 0.31" visible="false"></a-text>

      <a-box id="btnSair" class="clickable" position="3 -0.85 0.22" width="2.15" height="0.46" depth="0.08" color="#b84e4e" opacity="0.96" visible="false" onclick="sairExperiencia()"></a-box>
      <a-text id="textBtnSair" class="clickable" value="SAIR" onclick="sairExperiencia()" width="1.85" color="#fff" anchor="center" align="center" wrapCount="8" font-size="10" position="3 -0.85 0.31" visible="false"></a-text>
    </a-entity>

    <!-- Corredor de períodos atrás da praça -->
    <a-entity id="corredorGroup">
      <!-- Corredor ampliado: largura maior e comprimento maior -->
      <a-plane rotation="-90 0 0" width="12" height="80" color="#8A8A8A" position="0 0.01 -34"></a-plane>
      <a-plane rotation="-90 0 0" width="2" height="80" color="#6E6E6E" position="0 0.02 -34"></a-plane>
      <a-box width="0.25" height="0.35" depth="80" color="#9A9A9A" position="-6 0.2 -34"></a-box>
      <a-box width="0.25" height="0.35" depth="80" color="#A8A8A8" position="6 0.2 -34"></a-box>
      <!-- corridor heading removed to reduce visual noise (plaques used instead) -->
      <a-entity id="portasCorredor" scale="1.12 1.12 1"></a-entity>

      <!-- Postes de luz ao longo do corredor (simples, com point-light fraca) -->
      <a-entity id="postesCorredor">
        <a-entity position="-10.6 0 1.6">
          <a-entity gltf-model="#modelPosteLuz" position="0 0 0" rotation="0 145 0" scale="1 1 1" pointer-events="none"></a-entity>
          <a-entity light="type: point; intensity: 0.55; distance: 8; color: #fff2a0" position="0 1.8 0"></a-entity>
        </a-entity>
        <a-entity position="10.6 0 1.6">
          <a-entity gltf-model="#modelPosteLuz" position="0 0 0" rotation="0 -145 0" scale="1 1 1" pointer-events="none"></a-entity>
          <a-entity light="type: point; intensity: 0.55; distance: 8; color: #fff2a0" position="0 1.8 0"></a-entity>
        </a-entity>
        <a-entity position="-10.6 0 -12">
