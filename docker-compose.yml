services:
  db:
    image: postgres:16
    container_name: gradus_postgres
    environment:
      POSTGRES_USER: gradus
      POSTGRES_PASSWORD: gradus123
      POSTGRES_DB: gradus_db
    volumes:
      - gradus_pgdata:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  backend:
    build: ./backend
    container_name: gradus_backend
    ports:
      - target: 3000
        published: 0
        protocol: tcp
        mode: host
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: gradus
      DB_PASSWORD: gradus123
      DB_NAME: gradus_db

  frontend:
    build: ./frontend
    container_name: gradus_frontend
    ports:
      - target: 80
        published: 0
        protocol: tcp
        mode: host
    depends_on:
      - backend

volumes:
  gradus_pgdata:
